name: Deploy to Tailscale Server

on:
  push:
    branches:
      - main # Workflow akan berjalan otomatis setiap kamu push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository code ke runner GitHub Actions
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Hubungkan Runner GitHub Actions ke Jaringan VPN Tailscale
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

    # 3. Setup SSH Private Key di Runner agar bisa login tanpa password
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 100.79.215.75 >> ~/.ssh/known_hosts

    # 4. Masuk ke Server via SSH dan eksekusi Git Pull
    - name: Execute Remote SSH Commands
      run: |
        ssh ${{ secrets.SERVER_USERNAME }}@100.79.215.75 << 'EOF'
          # Masuk ke folder repository project di server kamu
          # (Silakan ubah path /var/www/html/SistemPeminjaman sesuai dengan lokasi asli di server)
          cd /var/www/SistemPeminjaman
          
          # Ambil update codingan terbaru dari GitHub
          git pull origin main
          
          # Jika aplikasi menggunakan dependensi tertentu, kamu bisa menambahkannya di bawah ini:
          # Contoh jika PHP/Laravel: composer install --no-dev
          # Contoh jika NodeJS: npm install && pm2 restart app
        EOF